name: Daily AI Research Pipeline

on:
  schedule:
    - cron: "0 7 * * *"
      timezone: "Asia/Taipei"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-ai-research-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FASTAPI_BASE_URL: ${{ secrets.FASTAPI_BASE_URL }}
      API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
      PIPELINE_REQUEST_TIMEOUT_SECONDS: "600"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${FASTAPI_BASE_URL:-}" ]; then
            echo "FASTAPI_BASE_URL is missing"
            exit 1
          fi
          if [ -z "${API_AUTH_TOKEN:-}" ]; then
            echo "API_AUTH_TOKEN is missing"
            exit 1
          fi
          echo "Scheduled run target: 07:00 Asia/Taipei (timezone-aware schedule)"
          echo "Workflow mode: daily + three-day merged pipeline"

      - name: Run merged daily pipeline
        id: run_pipeline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/github_daily_pipeline.py

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Daily AI Research Pipeline"
            echo ""
            echo "- Trigger: scheduled for 07:00 Asia/Taipei"
            echo "- Cron: 0 7 * * *"
            echo "- Timezone: Asia/Taipei"
            echo "- Mode: merged daily + three-day"
            echo "- Payload target: multiple smaller /pipeline/run calls"
          } >> "$GITHUB_STEP_SUMMARY"
